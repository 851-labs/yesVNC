name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  BUN_VERSION: "1.3.14"

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run check

  build:
    needs: metadata
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [darwin-arm64, darwin-x64]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Build archive
        run: scripts/release/build-cli-archive.sh "${{ needs.metadata.outputs.version }}" dist/release "${{ matrix.target }}"
      - uses: actions/upload-artifact@v7
        with:
          name: yesvnc-${{ matrix.target }}
          path: |
            dist/release/*.tar.gz
            dist/release/*.sha256

  publish:
    needs: [metadata, checks, build]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      VERSION: ${{ needs.metadata.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v8
        with:
          path: dist/release
          merge-multiple: true
      - name: Verify package version
        run: |
          package_version=$(node -p "require('./apps/cli/package.json').version")
          test "$package_version" = "$VERSION"
      - name: Publish GitHub release
        run: |
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            gh release upload "v$VERSION" dist/release/* --clobber
          else
            gh release create "v$VERSION" dist/release/* --generate-notes --title "yesVNC $VERSION"
          fi
      - name: Update Homebrew tap
        if: env.TAP_TOKEN != ''
        run: |
          tap_dir="$RUNNER_TEMP/homebrew-tap"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/851-labs/homebrew-tap.git" "$tap_dir"
          REPOSITORY="$GITHUB_REPOSITORY" ARTIFACT_DIR="dist/release" node scripts/release/update-homebrew-tap.mjs "$tap_dir"
          cd "$tap_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/yesvnc.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula is already up to date."
          else
            git commit -m "Update yesVNC to $VERSION"
            git push
          fi
